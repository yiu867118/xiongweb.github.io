<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>熊家新闻</title>
        <style>
            #con {
                position: relative;
                max-width: 90%;
                margin: 10px auto;
                background-color: rgba(255, 255, 255, 0.3);
                border-radius: 10px;
                box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
                overflow: hidden;
                padding: 10px;
            }

            #con::before {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-image: url(love_pic/t.png);
                background-size: 100%;
                opacity: 0.9;
                z-index: -1;
            }

            #header{
                text-align: center;
            }
            #h1{
                text-shadow: 2px 2px 8px aliceblue;
            }
            #h1:hover, #img:hover{
                transform: scale(1.02); 
                transition: transform 0.3s ease;
            }
            h3{
                font-size: 19px;
            }
            p{
                font-size: 17px;
            }
            #img{
                border-radius: 30px;
            }
            #p1, #nav, #section{
                text-align: left;
                margin-left: 10%;
                margin-right: 10%;
                line-height: 1.8;
            }
            p:hover{
                background-color: rgb(210, 236, 252);
            }
            #mousePicture{
                position: absolute;
                z-index: 1000;
            }
            @keyframes move{
                from{transform: translateX(0%);}
                to{transform: translateX(100%);}
            }
            #panda{
                animation-name: move;
                animation-duration: 20s;
                animation-iteration-count: infinite;
            }
            #back{
                background: rgb(208, 239, 250);
                color: rgb(12, 12, 12);
                font-size: 18px;
                font-weight: 600;
                border: none;
                padding: 20px 20px;
                border-radius: 60px;
                margin-left: 3%;
                margin-top: 2%;
            }
            #back:hover{
                background: rgb(152, 216, 246);
            }
        </style>
    </head>
    <body>
        <div id="panda">
            <img src="home_pic/101.jpg" style="width: 30px; height: 30px;" alt="">
        </div>
        <div id="con">
            <div>
                <button id="back" onclick="history.back()">Back</button>
            </div>
            <header id="header">
                <br>
                <h1 id="h1">两只小熊本科毕业, 准备开启下个副本</h1>
                <br>
                <p id="p1"> </p>
                <br>
                <figure>
                    <img id="img" src="home_pic/105.jpg" width="400" height="550">
                </figure>
            </header>
            <br>
            <br>
            
            <!-- <nav id="nav">
                <h3></h3>
                <ul>
                    <li><a href="#life"></a></li>
                    <li><a href="#character"></a></li>
                </ul>
                <br><br>
            </nav> -->
            <section id="section">
                <article id="life">
                    <h3></h3><br>
                    <p>
                        2022年8月17日，两只熊正式本科毕业了。在这一天，他们在学校领到了学位服，并在学校门口的快拍店拍了照片。拍照时，两只熊不禁回忆起在庆南的美好生活：每天放学后去池塘喂鱼，去海边散步。这些美好的时光让他们对即将离开的校园生活感到些许不舍。<br><br>

                        特别是小光，他对教学楼新换的自动马桶感到依依不舍。每次去厕所，热乎乎的马桶座让他感到无比舒适。离开这里后，小光不禁担心自己还能否继续享受这种温暖的体验。
                        
                        <br><br></p>
                </article>
                <br>
                <article id="character">
                    <h3></h3>
                    <p></p>
                        <br>
                </article>
            </section>
        </div>
    </body>
</html>
