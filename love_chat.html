        /* 图库样式 */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 40px;
        }

        .image-container {
            position: relative; /* 修正位置问题 */
            flex-grow: 1;
            min-width: 200px;
            max-width: 300px;
            height: auto;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border-radius: 15px;
            transition: transform 0.2s ease, opacity 0.2s ease; /* 更改动画持续时间 */
        }


        .image-container:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 8px;
        }

        /* 图片样式 */
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 15px;
            opacity: 0.1; /* 初始透明度 */
            transition: opacity 0.2s ease; /* 平滑过渡效果 */
        }

        .image-container:hover img {
            opacity: 1; /* 悬停时变为完全不透明 */
        }

        /* 文字浮层 */
        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(254, 253, 253, 0); /* 设置为不透明的黑色背景 */
            color: rgba(255, 255, 255, 0); 
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 0 0 15px 15px;
            opacity: 0; /* 初始状态下不可见 */
            transition: opacity 0.2s ease; /* 添加平滑过渡效果 */
        }

        .image-container:hover .overlay {
            opacity: 1; /* 悬停时显示浮层 */
        }


        .text {
            font-size: 1.5rem;
            text-align: center;
        }

        .bubble {
            position: absolute;
            width: 20px; /* 调整泡泡大小 */
            height: 20px; /* 调整泡泡大小 */
            background: linear-gradient(135deg, rgba(19, 150, 244, 0.7), rgba(255, 255, 255, 0.5)); /* 渐变色 */
            border-radius: 50%; /* 圆形泡泡 */
            filter: blur(1px); /* 模糊滤镜 */
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3); /* 柔和的阴影 */
            animation: float 60s infinite ease-in-out; /* 漂浮动画，增加时间，加入缓和效果 */
        }

        .bubble::before,
        .bubble::after {
            content: "";
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.4); /* 调整颜色和透明度 */
            border-radius: 50%;
            filter: blur(2px);
        }

        .bubble::before {
            top: -8px;
            left: -6px;
        }

        .bubble::after {
            left: 8px;
            top: 4px;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0);
                opacity: 0.8; /* 起始位置半透明 */
            }
            50% {
                transform: translate(-20px, -2000px) rotate(10deg); /* 向左漂浮并旋转 */
                opacity: 0.6; /* 中间透明度 */
            }
            100% {
                transform: translate(20px, -4000px) rotate(-10deg); /* 向右漂浮并旋转 */
                opacity: 0; /* 结束时逐渐变透明 */
            }
        }

        /* 星光点效果 */
        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(247, 209, 56, 0.7);
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        function createBubble() {
            const bubble = document.createElement('div');
            bubble.classList.add('bubble');
            bubble.style.left = Math.random() * 100 + 'vw';
            bubble.style.animationDuration = (Math.random() * 5 + 5) + 's'; /* 随机的动画时间 */
            document.body.appendChild(bubble);

            // 创建星光效果
            const starCount = Math.floor(Math.random() * 3) + 1; /* 随机数量星光 */
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                star.style.left = (Math.random() * 10 - 5) + 'px'; /* 随机星光位置 */
                star.style.top = (Math.random() * 10 - 5) + 'px';
                bubble.appendChild(star);
            }

            setTimeout(() => {
                bubble.remove();
            }, 8000); /* 泡泡存在时间，与动画一致 */
        }

        setInterval(createBubble, 600); /* 控制泡泡生成频率 */



        // 更新滚动进度条的 JavaScript
        window.onscroll = function() {
            const scrollProgressBar = document.getElementById('scrollProgressBar');
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrollPercentage = (scrollTop / scrollHeight) * 100;
            scrollProgressBar.style.height = scrollPercentage + "%";
        };


    </script>
