<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>熊家新闻</title>
        <style>
            #con {
                position: relative;
                max-width: 90%;
                margin: 10px auto;
                background-color: rgba(255, 255, 255, 0.6);
                border-radius: 10px;
                box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
                overflow: hidden;
                padding: 10px;
            }

            #con::before {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-image: url(love_pic/u.jpg);
                background-size: 100%;
                opacity: 0.9;
                z-index: -1;
            }

            #header{
                text-align: center;
            }
            #h1{
                text-shadow: 2px 2px 8px aliceblue;
            }
            #h1:hover, #img:hover{
                transform: scale(1.02); 
                transition: transform 0.3s ease;
            }
            h3{
                font-size: 19px;
            }
            p{
                font-size: 17px;
            }
            #img{
                border-radius: 30px;
            }
            #p1, #nav, #section{
                text-align: left;
                margin-left: 10%;
                margin-right: 10%;
                line-height: 1.8;
            }
            p:hover{
                background-color: rgb(232, 243, 249, 0.6);
                transform: scale(1.05);
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            }
            #mousePicture{
                position: absolute;
                z-index: 1000;
            }
            @keyframes move{
                from{transform: translateX(0%);}
                to{transform: translateX(100%);}
            }
            #panda{
                animation-name: move;
                animation-duration: 20s;
                animation-iteration-count: infinite;
            }
            #back{
                background: rgb(208, 239, 250);
                color: rgb(12, 12, 12);
                font-size: 18px;
                font-weight: 600;
                border: none;
                padding: 20px 20px;
                border-radius: 60px;
                margin-left: 3%;
                margin-top: 2%;
            }
            #back:hover{
                background: rgb(145, 217, 251);
            }
        </style>
    </head>
    <body>
        <div id="panda">
            <img src="home_pic/101.jpg" style="width: 30px; height: 30px;" alt="">
        </div>
        <div id="con">
            <div>
                <button id="back" onclick="history.back()">Back</button>
            </div>
            <header id="header">
                <br>
                <h1 id="h1">熊家烟花节</h1>
                <br>
                <p id="p1"> </p>
                <br>
                <figure>
                    <img id="img" src="home_pic/107_1.jpg" width="350" height="500">
                    <img id="img" src="home_pic/107_2.jpg" width="350" height="500">
                </figure>
            </header>
            <br>
            <br>
            
            <!-- <nav id="nav">
                <h3></h3>
                <ul>
                    <li><a href="#life"></a></li>
                    <li><a href="#character"></a></li>
                </ul>
                <br><br>
            </nav> -->
            <section id="section">
                <article id="life">
                    <h3></h3><br>
                    <p>
                        又到了首尔一年一度的烟花节，小熊一家决定出动去看烟花。去年的烟花节时看烟花的时候还是我们两个人，今年变成三个人了。小熊宝宝穿着小棕熊皮被小光爸爸挂着带出门了。<br><br>

                        还是和往常一样，小熊宝宝在家跟大王似的，一出门就变成小害怕了，一动不动的真老实。一有陌生人看，就maimaimai的大哭。不过，小熊宝宝骑在小光爸爸头顶特别开心，仿佛整个世界都是他的游乐场。<br><br>

                        烟花节的夜晚，天空被五彩缤纷的烟花点亮，小熊宝宝的眼睛也跟着闪闪发光。
                        
                        <br><br></p>
                </article>
                <br>
                <article id="character">
                    <h3></h3>
                    <p></p>
                        <br>
                </article>
            </section>
        </div>
    </body>
</html>
