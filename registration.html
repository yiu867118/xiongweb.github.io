<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>join xiong's family</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: rgb(234, 253, 241);
            position: relative;
        }
        .container {
            background: url(home_pic/login.jpg);
            background-size: 500px 350px ;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 500px;
            text-align: center;
            position: absolute;
            margin-top: 20%;
            margin-left: 50%;
            transform: translate(-50%, -50%);
        }
        .input {
            margin-bottom: 10px;
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .sub {
            background-color: #2da75c;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
        }
        .sub:hover {
            background-color: #85cfa4;
        }
        #create-account {
            margin-top: 10px;
            font-size: 12px;
            font-weight: 600;
            color: #070707;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>加入熊家会员</h2>
        <form action="/register"  onsubmit="return registerSuccess()">
            <input type="email" class="input" name="email" placeholder="邮箱" required><br>
            <input type="password" class="input" name="password" placeholder="密码" required><br>
            <input type="password" class="input" name="passwordSure" placeholder="再次输入密码" required><br><br>
            <button type="submit" class="sub">加入会员</button>
        </form>
        <p id="create-account">已经有熊家会员账号了? <a href="login.html">点击这里转到登陆页面</a>.</p>
    </div>
    <script>
        function registerSuccess() {
            alert('成功创建熊家会员账号!');
            window.location.href = 'homepage.html';
            return false; 
        }
    </script>
</body>
</html>
