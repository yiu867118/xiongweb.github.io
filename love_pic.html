    <style>
        @font-face {
            font-family: 'KaiTi';
            src: url('STKAITI.TTF') format('truetype'),
                url('STXINWEI.TTF') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        .container {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            margin: 10px auto;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            padding: 10px;
        }

        .container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url(love_pic/j.jpg);
            background-size: 100%;
            opacity: 0.9;
            z-index: -1;
        }



        header div {
            display: flex;
            align-items: center;
        }

        body {

            background-color: #f0f6fc;
            margin: 0;
            padding: 0;
            color: #333;
            overflow-x: hidden;
        }

    

        header {
            display: flex;
            justify-content: center; /* 居中对齐 */
            padding: 50px 20px;
            background-color: #3faeef;
            color: #fff;
            border-radius: 12px;
            background-image: url(love_pic/g.jpg);

        .title {

            font-weight: bold;

        }

        .intro {
            font-size: 18px;
            margin-bottom: 0;
        }

        .timeline {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            position: relative;
            padding-left: 40px;
        }

        .year {
            display: flex;
            align-items: flex-start;
            margin-bottom: 40px;
            width: 100%;
        }

        .year-label {
            font-size: 20px;
            font-weight: bold;
            color: #3faeef;
            background-color: #f0f6fc;
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            flex-shrink: 0;
            margin-right: 20px;
            position: relative;
        }

        .content {
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: calc(100% - 100px);
        }

        .caption-card {
            background-color: #f9f9f9;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            font-size: 16px;
            line-height: 1.6;
            color: #555;
        }

        .year-images {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .year-images img {
            width: 100%;
            border-radius: 8px;
            transition: transform 0.3s ease;
            max-width: 400px;
            height: auto;
        }

        .year-images img:hover {
            transform: scale(1.05);
        }

        .footer {
            background-color: #2c97d5;
            color: #fff;
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            margin-top: 40px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        .footer-links a {
            color: #fff;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: #007bff;
        }

        @media (max-width: 768px) {
            .timeline {
                padding-left: 20px;
            }

            .year {
                flex-direction: column;
                align-items: flex-start;
            }

            .year-label {
                margin-bottom: 15px;
            }

            .content {
                width: 100%;
            }
        }

        @keyframes float {
            0% {
                transform: translate(0, 0);
                opacity: 0.9;
            }
            50% {
                transform: translate(-20px, -8000px) rotate(10deg);
                opacity: 0.7;
            }
            100% {
                transform: translate(20px, -16000px) rotate(-10deg);
                opacity: 0.2;
            }
        }

        .bubble {
            position: absolute;
            width: 40px; /* 调整泡泡大小 */
            height: 40px; /* 调整泡泡大小 */
            background: linear-gradient(135deg, rgba(19, 150, 244, 0.7), rgba(255, 255, 255, 0.5)); /* 渐变色 */
            border-radius: 50%; /* 圆形泡泡 */
            filter: blur(1px); /* 模糊滤镜 */
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3); /* 柔和的阴影 */
            animation: float 1000s infinite ease-in-out; /* 漂浮动画，增加时间，加入缓和效果 */
            will-change: transform, opacity; /* 性能优化 */
        }

        .bubble::before,
        .bubble::after {
            content: "";
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.4); /* 调整颜色和透明度 */
            border-radius: 50%;
            filter: blur(2px);
        }

        .bubble::before {
            top: -8px;
            left: -6px;
        }

        .bubble::after {
            left: 8px;
            top: 4px;
        }


        .float {
            animation: float 10s linear infinite;
        }

        /* 星光点效果 */
        @keyframes starTwinkle {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .star {
            animation: starTwinkle 1.5s infinite; /* Twinkle animation */
        }

    </style>

<script>
   function createBubble() {
        const bubble = document.createElement('div');
        bubble.classList.add('bubble');
        bubble.style.left = Math.random() * 100 + 'vw';
        bubble.style.animationDuration = (Math.random() * 50 + 15) + 's'; // Set floating animation duration
        document.body.appendChild(bubble);

        // Create star
        const starCount = Math.floor(Math.random() * 3) + 1; // Random number of stars
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.position = 'absolute'; // Absolute position for stars
            star.style.width = '4px'; // Star width
            star.style.height = '4px'; // Star height
            star.style.backgroundColor = 'rgba(247, 209, 56, 0.8)'; // Star color
            star.style.borderRadius = '50%'; // Make stars circular
            star.style.left = (Math.random() * 40) - 20 + 'px'; // Random star position within bubble
            star.style.top = (Math.random() * 40) - 20 + 'px';
            star.style.opacity = Math.random(); // Random opacity for twinkling effect
            star.style.zIndex = '1'; // Ensure stars are on top of the bubble
            bubble.appendChild(star);
        }

        setTimeout(() => {
            bubble.remove();
        }, 8000); // Duration for bubble to exist, matching animation
    }


    

        setInterval(createBubble, 600); // 控制泡泡生成频率

        window.onload = function() {
            const styleSheet = document.styleSheets[0];

            // 动态插入CSS规则
            const pageHeight = document.body.scrollHeight; // 获取页面的总高度
            const animationRule = `
                @keyframes float {
                    0% {
                        transform: translate(0, 0);
                        opacity: 0.8;
                    }
                    50% {
                        transform: translate(-20px, -${pageHeight * 0.3}px) rotate(10deg); /* 50% 页面高度 */
                        opacity: 0.6;
                    }
                    100% {
                        transform: translate(20px, -${pageHeight}px) rotate(-10deg); /* 100% 页面高度 */
                        opacity: 0;
                    }
                }
            `;

            styleSheet.insertRule(animationRule, styleSheet.cssRules.length);

            // 将动画应用到浮动元素
            const bubbles = document.querySelectorAll('.bubble');
            bubbles.forEach(bubble => {
                bubble.style.animation = "float 10s linear infinite";
            });
        };

</script>
