<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Join Xiong's Family</title>

 

    <style>
        @font-face {
            font-family: 'KaiTi';
            src: url('STKAITI.TTF') format('truetype'),
                url('STXINWEI.TTF') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        body {
            font-family: 'KaiTi', sans-serif;
            background-color: rgb(234, 253, 241);
            position: relative;
        }
        .container {
            background: url(home_pic/login.jpg);
            background-size: 100%;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 500px;
            height: auto;
            text-align: center;
            position: absolute;
            margin-top: 25%;
            margin-left: 50%;
            transform: translate(-50%, -50%);
        }
        .input {
            margin-bottom: 10px;
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .sub {
            background-color: #2da75c;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
        }
        .sub:hover {
            background-color: #85cfa4;
        }
        #create-account {
            margin-top: 10px;
            font-size: 12px;
            font-weight: 600;
            color: #070707;
        }
        p {
            font-size: 22px;
        }
        #loading {
            display: none;
            font-size: 16px;
            color: #2da75c;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>加入熊家会员</h2>
        <form onsubmit="return registerSuccess()">
            <input type="text" class="input" name="username" id="username" placeholder="用户名" required autocomplete="username"><br>
            <input type="email" class="input" name="email" id="email" placeholder="邮箱" required autocomplete="email"><br>
            <input type="password" class="input" name="password" id="password" placeholder="密码" required autocomplete="new-password"><br>
            <input type="password" class="input" name="passwordSure" id="passwordSure" placeholder="再次输入密码" required autocomplete="new-password"><br><br>
            <button type="submit" class="sub">加入会员</button>
        </form>
        <div id="loading">加载中...</div>
        <br>
        <p id="create-account">已经有熊家会员账号了? <a href="login.html">点击这里转到登陆页面</a>.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
        // 立即初始化 Supabase 客户端
        const supabaseUrl = 'https://uppjbtoicickglnjorjn.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVwcGpidG9pY2lja2dsbmpvcmpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mjg2MzE4MDUsImV4cCI6MjA0NDIwNzgwNX0.TnPWSguzaNfyoR4lYNngiiCAOThjfhf19iOJsW2o__M';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        document.addEventListener('DOMContentLoaded', function () {
            async function registerSuccess() {
                const email = document.querySelector('input[name="email"]').value;
                const password = document.querySelector('input[name="password"]').value;
                const loadingText = document.getElementById('loading');
                const submitButton = document.querySelector('.sub');

                // 显示加载状态
                loadingText.style.display = 'block';
                submitButton.disabled = true;

                try {
                    // 调用 Supabase API 注册用户并发送邮箱验证
                    const { error } = await supabase.auth.signUp({
                        email: email,
                        password: password,
                        options: {
                            emailRedirectTo: 'homepage.html'  // 替换为你需要的重定向页面
                        }
                    });

                    if (error) {
                        throw error;
                    }

                    alert('请检查邮箱并点击验证链接以完成注册！');
                } catch (error) {
                    console.error('注册错误:', error);
                    alert('注册失败: ' + error.message);
                } finally {
                    // 关闭加载状态
                    loadingText.style.display = 'none';
                    submitButton.disabled = false;
                }

                return false;  // 防止表单默认提交
            }

            // 绑定表单提交事件
            document.querySelector('form').onsubmit = registerSuccess;
        });
    </script>

</body>
</html>
