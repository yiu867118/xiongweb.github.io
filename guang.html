<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>简约主页</title>
    
    <style>
        /* 设置全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f0;
            background-image: url('guang_pic/501.jpg'); 
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 欢迎页样式 */
        .welcome-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            text-align: center;
            z-index: 10;
        }

        .welcome-container h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .welcome-container p {
            font-size: 1.5rem;
        }

        /* 主页面样式 */
        .main-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .text-container {
            position: absolute;
            top: 20%;
            text-align: center;
            z-index: 2;
        }

        .text-container p {
            font-size: 2rem;
            color: #fff;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 10px;
        }

        /* 背景图片设置 */
        .image-container {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* 图片切换样式 */
        #image-container.image-1 {
            background-image: url('image1.jpg');
        }

        #image-container.image-2 {
            background-image: url('image2.jpg');
        }

        #image-container.image-3 {
            background-image: url('image3.jpg');
        }

    </style>
</head>
<body>
    <div id="welcome-page" class="welcome-container">
        <h1>欢迎！</h1>
        <p>质疑我, 理解我, 成为我, 你就是下一个我.</p>
    </div>

    <div id="main-page" class="main-container">
        <div class="text-container" id="text-container">
            <p id="text">光学废话, 看起来废话很多, 实际上一点也不少.</p>
        </div>
        <div class="image-container" id="image-container">
            <!-- 背景图片将通过CSS设置 -->
        </div>
    </div>

    <script>
        // 检查本地存储是否展示欢迎页
        window.onload = function() {
            const welcomePage = document.getElementById('welcome-page');
            const mainPage = document.getElementById('main-page');
            const lastVisitTime = localStorage.getItem('lastVisitTime');
            const currentTime = new Date().getTime();
            const oneDay = 24 * 60 * 60 * 1000; // 24小时

            if (lastVisitTime && currentTime - lastVisitTime < oneDay) {
                welcomePage.style.display = 'none';
                mainPage.style.display = 'block';
            } else {
                welcomePage.style.display = 'flex';
                mainPage.style.display = 'none';

                // 点击欢迎页进入主页
                welcomePage.addEventListener('click', () => {
                    welcomePage.style.display = 'none';
                    mainPage.style.display = 'block';
                    localStorage.setItem('lastVisitTime', currentTime);
                });
            }
        };

        // 图片和文本的切换
        const texts = [
            "光学废话, 看起来废话很多, 实际上一点也不少.",
            "现实并不总是那么实用。",
            "越少表达，越多隐藏。"
        ];

        const images = ['image1.jpg', 'image2.jpg', 'image3.jpg'];
        let currentIndex = 0;

        document.getElementById('main-page').addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % texts.length;

            // 更新文本
            document.getElementById('text').textContent = texts[currentIndex];

            // 更新背景图片
            const imageContainer = document.getElementById('image-container');
            imageContainer.style.backgroundImage = `url(${images[currentIndex]})`;
        });

    </script>
</body>
</html>
