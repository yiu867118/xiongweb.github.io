<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>join xiong's family</title>
    <style>
        @font-face {
            font-family: 'KaiTi';
            src: url('STKAITI.TTF') format('truetype'),
                url('STXINWEI.TTF') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        body {
            font-family: 'KaiTi', sans-serif;
            background-color: rgb(234, 253, 241);
            position: relative;
        }
        .container {
            background: url(home_pic/login.jpg);
            background-size:100% ;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 500px;
            height: auto;
            text-align: center;
            position: absolute;
            margin-top: 25%;
            margin-left: 50%;
            transform: translate(-50%, -50%);
        }
        .input {
            margin-bottom: 10px;
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .sub {
            background-color: #2da75c;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
        }
        .sub:hover {
            background-color: #85cfa4;
        }
        #create-account {
            margin-top: 10px;
            font-size: 12px;
            font-weight: 600;
            color: #070707;
        }
        p{
            font-size: 22px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>熊家会员登陆</h2>
        <form action="/login" onsubmit="return loginSuccess()">
            <input type="text" class="input" name="identifier" placeholder="用户名 / 邮箱 / 手机号" required><br>
            <input type="password" class="input" name="password" placeholder="密码" required><br>
            <button type="submit" class="sub">Login</button>
        </form>
        <br>
        <p id="create-account">没有账号? <a href="login_registration.html">点击创建账号</a>.</p>
    </div>

    
    <script src="https://cdn.jsdelivr.net/npm/aws-amplify@latest/dist/aws-amplify.min.js"></script>
    <script>
        // Configure AWS Amplify
        Amplify.configure({
            Auth: {
                // Your Cognito details
                region: 'ap-northeast-2',
                userPoolId: 'ap-northeast-2_eDA8pl2f6',
                userPoolWebClientId: '4plj10evn069oo96t48tm4c6h9',
            }
        });

        async function loginSuccess() {
            const identifier = document.querySelector('input[name="identifier"]').value;
            const password = document.querySelector('input[name="password"]').value;

            try {
                // Attempt to sign in using the identifier (username, email, or phone number)
                await Amplify.Auth.signIn(identifier, password);
                alert('登录成功!');
                await logUserAccess(identifier);
                window.location.href = 'homepage.html';
            } catch (error) {
                alert('登录失败: ' + error.message);
            }
            return false; // Prevent default form submission
        }

        async function logUserAccess(identifier) {
            // Logic to log user access (increase visit count) using Amplify DataStore
        }
    </script>
</body>
</html>
