<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>join xiong's family</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: rgb(234, 253, 241);
            position: relative;
        }
        .container {
            background: url(home_pic/login.jpg);
            background-size: 100% ;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 500px;
            height: 300px;
            text-align: center;
            position: absolute;
            margin-top: 25%;
            margin-left: 50%;
            transform: translate(-50%, -50%);
        }
        .input {
            margin-bottom: 10px;
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .sub {
            background-color: #2da75c;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
        }
        .sub:hover {
            background-color: #85cfa4;
        }
        #create-account {
            margin-top: 10px;
            font-size: 12px;
            font-weight: 600;
            color: #070707;
        }
        @media (max-width: 600px) {
            .container {
                width: 90%;
                margin-top: 50%;
            }
            .sub {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>熊家会员登陆</h2>
        <form action="/login" onsubmit="return loginSuccess()">
            <input type="email" class="input" name="email" placeholder="Email" required><br>
            <input type="password" class="input" name="password" placeholder="Password" required><br>
            <button type="submit" class="sub">Login</button>
        </form>
        <p id="create-account">没有账号? <a href="login_registration.html">点击创建账号</a>.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/aws-amplify@latest/dist/aws-amplify.min.js"></script>
    <script>
        // Configure AWS Amplify
        Amplify.configure({
            Auth: {
                // Your Cognito details
                region: 'ap-northeast-2',
                userPoolId: 'ap-northeast-2_eDA8pl2f6',
                userPoolWebClientId: '4plj10evn069oo96t48tm4c6h9',
            }
        });

        async function loginSuccess() {
            const email = document.querySelector('input[name="email"]').value;
            const password = document.querySelector('input[name="password"]').value;
            try {
                await Amplify.Auth.signIn(email, password);
                alert('登录成功!');
                await logUserAccess(email);
                window.location.href = 'homepage.html';
            } catch (error) {
                alert('登录失败: ' + error.message);
            }
            return false;
        }

        async function logUserAccess(email) {
            // Logic to log user access (increase visit count) using Amplify DataStore
        }
    </script>
</body>
</html>
