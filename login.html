<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <title>登录 Xiong's Family</title>
    <style>
        @font-face {
            font-family: 'KaiTi';
            src: url('STKAITI.TTF') format('truetype'),
                url('STXINWEI.TTF') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        body {
            font-family: 'KaiTi', sans-serif;
            background-color: rgb(234, 253, 241);
            position: relative;
        }
        .container {
            background: url(home_pic/login.jpg);
            background-size: 100%;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 500px;
            height: auto;
            text-align: center;
            position: absolute;
            margin-top: 25%;
            margin-left: 50%;
            transform: translate(-50%, -50%);
        }
        .input {
            margin-bottom: 10px;
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .sub {
            background-color: #2da75c;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
        }
        .sub:hover {
            background-color: #85cfa4;
        }
        #create-account {
            margin-top: 10px;
            font-size: 12px;
            font-weight: 600;
            color: #070707;
        }
        p {
            font-size: 22px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>熊家会员登陆</h2>
        <form action="/login" onsubmit="return loginSuccess()">
            <input type="text" class="input" name="identifier" placeholder="用户名 / 邮箱" required><br>
            <input type="password" class="input" name="password" placeholder="密码" required><br>
            <button type="submit" class="sub">Login</button>
        </form>
        <br>
        <p id="create-account">没有账号? <a href="login_registration.html">点击创建账号</a>.</p>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
        // 初始化 Supabase 客户端
        const supabaseUrl = 'https://uppjbtoicickglnjorjn.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVwcGpidG9pY2lja2dsbmpvcmpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mjg2MzE4MDUsImV4cCI6MjA0NDIwNzgwNX0.TnPWSguzaNfyoR4lYNngiiCAOThjfhf19iOJsW2o__M';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function loginSuccess() {
            const identifier = document.querySelector('input[name="identifier"]').value;
            const password = document.querySelector('input[name="password"]').value;

            try {
                // 使用 Supabase 进行登录
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: identifier,
                    password: password,
                });

                if (error) {
                    throw error;
                }

                alert('登录成功!');
                window.location.href = 'homepage.html';  // 登录成功后跳转到主页
            } catch (error) {
                // 根据错误信息显示提示
                switch (error.message) {
                    case 'Invalid login credentials':
                        alert('用户名或密码错误。');
                        break;
                    case 'Email not confirmed':
                        alert('用户尚未确认，请检查邮箱。');
                        break;
                    default:
                        alert('登录失败: ' + error.message);
                }
            }

            return false; // 防止表单默认提交
        }
    </script>
</body>
</html>
