<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>熊家新闻</title>
        <style>
            #container{
                background: aliceblue;
                position: relative;
                max-width: 90%;
                margin: 10px auto;
                /* background-color: rgba(255, 255, 255, 0.9); */
                border-radius: 10px;
                box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
                overflow: hidden;
                padding: 10px;
            }
            #header{
                text-align: center;
            }
            #h1{
                text-shadow: 2px 2px 8px aliceblue;
            }
            #h1:hover, #img:hover{
                transform: scale(1.02); 
                transition: transform 0.3s ease;
            }
            h3{
                font-size: 19px;
            }
            p{
                font-size: 17px;
            }
            #img{
                border-radius: 30px;
            }
            #p1, #nav, #section{
                text-align: left;
                margin-left: 10%;
                margin-right: 10%;
                line-height: 1.8;
            }
            p:hover{
                background-color: rgb(210, 236, 252);
            }
            #mousePicture{
                position: absolute;
                z-index: 1000;
            }
            @keyframes move{
                from{transform: translateX(0%);}
                to{transform: translateX(100%);}
            }
            #panda{
                animation-name: move;
                animation-duration: 20s;
                animation-iteration-count: infinite;
            }
            #back{
                background: rgb(208, 239, 250);
                color: rgb(12, 12, 12);
                font-size: 20px;
                font-weight: 600;
                border: none;
                padding: 20px 20px;
                border-radius: 60px;
                margin-left: 3%;
                margin-top: 2%;
            }
            #back:hover{
                background: rgb(123, 210, 250);
            }
        </style>
    </head>
    <body>
        <div id="panda">
            <img src="home_pic/101.jpg" style="width: 30px; height: 30px;" alt="">
        </div>
        <div id="container">
            <div>
                <button id="back" onclick="history.back()">Back</button>
            </div>
            <header id="header">
                <br>
                <h1 id="h1">两只熊的济州岛奇妙之旅：雨中探秘与海底冒险</h1>
                <br>
                <p id="p1"> </p>
                <br>
                <figure>
                    <img id="img" src="home_pic/104_1.jpg" width="250" height="200">
                    <img id="img" src="home_pic/104_2.jpg" width="250" height="200">
                </figure>
            </header>
            <br>
            <br>
            
            <!-- <nav id="nav">
                <h3></h3>
                <ul>
                    <li><a href="#life"></a></li>
                    <li><a href="#character"></a></li>
                </ul>
                <br><br>
            </nav> -->
            <section id="section">
                <article id="life">
                    <h3></h3><br>
                    <p>
                        近日，两只可爱的熊决定前往济州岛，享受一段幸福的旅行。在这次旅程中，他们在雨中参观了健康和爱博物馆，体验了丰富的文化和历史。此外，他们还乘坐潜水艇，探索了神秘的海底世界。<br><br>

                        尽管天气炎热，但这并没有影响他们的好心情。两只熊在济州岛度过了愉快的时光，并决定下次再来时一定要自驾游，以便更自由地探索这个美丽的岛屿。他们开玩笑说，如果不自驾游，可能会被热死成光熊呢！不过，小光只带小君在济州岛玩了一天，这让小君有点记仇。<br><br>
                        
                        这次旅行不仅让两只熊收获了美好的回忆，也让他们更加期待下一次的济州岛之行。<br><br></p>
                </article>
                <br>
                <article id="character">
                    <h3></h3>
                    <p></p>
                        <br>
                </article>
            </section>
        </div>
    </body>
</html>
